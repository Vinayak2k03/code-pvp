version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: codepvp
      POSTGRES_PASSWORD: codepvp_secret
      POSTGRES_DB: codepvp
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U codepvp"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ─── Judge0 CE (local code execution) ───────────────────────

  judge0-server:
    image: mrkushalsm/judge0:latest
    platform: linux/amd64
    restart: unless-stopped
    ports:
      - "2358:2358"
    privileged: true
    security_opt:
      - seccomp:unconfined
      - apparmor:unconfined
    environment:
      POSTGRES_HOST: judge0-db
      POSTGRES_DB: judge0
      POSTGRES_USER: judge0
      POSTGRES_PASSWORD: judge0_secret
      REDIS_HOST: judge0-redis
      REDIS_PORT: 6379
      RAILS_MAX_THREADS: 8
      RAILS_SERVER_PROCESSES: 2
      ENABLE_WAIT_RESULT: "true"
      ENABLE_BATCHED_OPERATIONS: "true"
      JUDGE0_TELEMETRY_ENABLED: "false"
      JUDGE0_ALLOW_CGROUPS: "true"
      ALLOW_ENABLE_SYS_ADMIN: "true"
    volumes:
      - /sys/fs/cgroup:/sys/fs/cgroup:rw
    depends_on:
      judge0-db:
        condition: service_healthy
      judge0-redis:
        condition: service_healthy

  judge0-workers:
    image: mrkushalsm/judge0:latest
    platform: linux/amd64
    restart: unless-stopped
    command: ["./scripts/workers"]
    privileged: true
    security_opt:
      - seccomp:unconfined
      - apparmor:unconfined
    environment:
      POSTGRES_HOST: judge0-db
      POSTGRES_DB: judge0
      POSTGRES_USER: judge0
      POSTGRES_PASSWORD: judge0_secret
      REDIS_HOST: judge0-redis
      REDIS_PORT: 6379
      RAILS_MAX_THREADS: 8
      JUDGE0_TELEMETRY_ENABLED: "false"
      JUDGE0_ALLOW_CGROUPS: "true"
      ALLOW_ENABLE_SYS_ADMIN: "true"
    volumes:
      - /sys/fs/cgroup:/sys/fs/cgroup:rw
    depends_on:
      judge0-db:
        condition: service_healthy
      judge0-redis:
        condition: service_healthy

  judge0-db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: judge0
      POSTGRES_PASSWORD: judge0_secret
      POSTGRES_DB: judge0
    volumes:
      - judge0-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U judge0"]
      interval: 5s
      timeout: 5s
      retries: 5

  judge0-redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - judge0-redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ─── App Services (optional, for full Docker deploy) ────────

  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "4000:4000"
    environment:
      DATABASE_URL: postgresql://codepvp:codepvp_secret@postgres:5432/codepvp
      REDIS_URL: redis://redis:6379
      JWT_SECRET: change-me-in-production
      PORT: 4000
      NODE_ENV: production
      JUDGE0_API_URL: http://judge0-server:2358
      JUDGE0_API_KEY: ""
      CLIENT_URL: https://codeclash.vinayaknagar.me
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      judge0-server:
        condition: service_started

  client:
    build:
      context: ./client
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: https://api.codeclash.vinayaknagar.me
        NEXT_PUBLIC_WS_URL: https://api.codeclash.vinayaknagar.me
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: https://api.codeclash.vinayaknagar.me
      NEXT_PUBLIC_WS_URL: https://api.codeclash.vinayaknagar.me
    depends_on:
      - server

volumes:
  pgdata:
  redisdata:
  judge0-pgdata:
  judge0-redisdata:
